version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ccompiler-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ccompiler
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ccompiler-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      sandbox-builder:
        condition: service_completed_successfully
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma db push && npx prisma generate && npm run seed && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ccompiler-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  # Optional: build sandbox image on compose up
  sandbox-builder:
    build:
      context: ./docker
      dockerfile: Dockerfile.sandbox
    image: ccompiler-sandbox
    container_name: ccompiler-sandbox-builder
    command: echo "Sandbox image built"

volumes:
  postgres_data:
