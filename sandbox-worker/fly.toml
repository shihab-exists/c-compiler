app = "ccompiler-sandbox-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DOCKER_IMAGE = "ccompiler-sandbox"
  SANDBOX_TIMEOUT_MS = "10000"
  SANDBOX_MEMORY_MB = "128"
  SANDBOX_CPU_LIMIT = "1.0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
