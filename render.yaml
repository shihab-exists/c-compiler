services:
  - type: web
    name: ccompiler-backend
    env: node
    plan: starter
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ccompiler-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://ccompiler-frontend.onrender.com
      - key: SANDBOX_URL
        value: https://your-sandbox-worker.onrender.com
      # Add GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET manually in Render dashboard

  - type: static
    name: ccompiler-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://ccompiler-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ccompiler-backend.onrender.com/api/*
      - type: rewrite
        source: /socket.io/*
        destination: https://ccompiler-backend.onrender.com/socket.io/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ccompiler-db
    plan: starter
    databaseName: ccompiler
    user: ccompiler
